<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ids and Classes in Html</title>
    <link rel="stylesheet" href="style7.css">
</head>
<body>
    <!-- Classes and ID -->
     <!-- ID:ID is an identifier for a single HTML element. We tag id by "#" -->

     <div id="content">
      <h1 id="main-title">Main Title</h1>
        <p>This is a paragraph with an ID.</p>
      </div>
      <!-- Class: A class is an identifier for multiple HTML elements
       We can give multiple classes to an element but id is unique.We tag class by "." -->
      <div class="container">
        <h1 id="sub-title" class="SubTitle title">Sub Title</h1>
        <p>This is a paragraph with a class.</p>
        <p>This is another paragraph with the same class.</p>
      </div>

</body>
</html>
